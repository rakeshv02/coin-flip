<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Coin Flip Online — Heads or Tails — Tabutility</title>
<meta name="description" content="Free online coin flip. Flip a virtual coin and get heads or tails. Tracks your flip history and stats."/>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-78VZWJ5B1W"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-78VZWJ5B1W');</script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7039091592734005" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f172a;color:#f1f5f9;min-height:100vh}
nav{background:#1e293b;border-bottom:1px solid #334155;padding:14px 24px;display:flex;align-items:center;gap:16px}
nav a{color:#94a3b8;text-decoration:none;font-size:14px}nav a:hover{color:#f1f5f9}
nav .brand{color:#38bdf8;font-weight:700;font-size:18px}
.ad-banner{background:#1e293b;border-bottom:1px solid #334155;padding:8px;text-align:center}
@keyframes flip{0%{transform:rotateY(0deg)}50%{transform:rotateY(900deg)}100%{transform:rotateY(1800deg)}}
.flipping{animation:flip 1s ease-in-out}
</style>
</head>
<body>
<nav><span class="brand">⚡ Tabutility</span><a href="https://tabutility.com">← All Tools</a></nav>
<div class="ad-banner"><ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-7039091592734005" data-ad-slot="auto" data-ad-format="auto" data-full-width-responsive="true"></ins><script>(adsbygoogle=window.adsbygoogle||[]).push({});</script></div>
<div id="root"></div>
<script type="text/babel">
//<![CDATA[
const { useState, useRef } = React;

export default function CoinFlip() {
  const [result, setResult] = useState(null);
  const [flipping, setFlipping] = useState(false);
  const [history, setHistory] = useState([]);
  const [heads, setHeads] = useState(0);
  const [tails, setTails] = useState(0);
  const [streak, setStreak] = useState({ val: null, count: 0 });
  const coinRef = useRef(null);

  const flip = () => {
    if (flipping) return;
    setFlipping(true);
    setResult(null);
    if (coinRef.current) {
      coinRef.current.classList.remove('flipping');
      void coinRef.current.offsetWidth;
      coinRef.current.classList.add('flipping');
    }
    setTimeout(() => {
      const r = Math.random() < 0.5 ? 'Heads' : 'Tails';
      setResult(r);
      setHistory(h => [r, ...h.slice(0,49)]);
      if (r === 'Heads') setHeads(h => h+1); else setTails(t => t+1);
      setStreak(s => s.val === r ? {val:r,count:s.count+1} : {val:r,count:1});
      setFlipping(false);
    }, 1000);
  };

  const total = heads + tails;
  const hPct = total ? Math.round(heads/total*100) : 50;
  const tPct = total ? Math.round(tails/total*100) : 50;

  return (
    <div style={{maxWidth:520,margin:'40px auto',padding:'0 20px'}}>
      <h1 style={{textAlign:'center',fontSize:28,fontWeight:700,marginBottom:8}}>Coin Flip</h1>
      <p style={{textAlign:'center',color:'#94a3b8',marginBottom:40}}>Click the coin or the button — heads or tails?</p>

      <div style={{background:'#1e293b',borderRadius:20,padding:'40px 24px',textAlign:'center',border:'1px solid #334155',marginBottom:24}}>
        <div ref={coinRef} onClick={flip} style={{width:180,height:180,borderRadius:'50%',margin:'0 auto 32px',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',background: result==='Heads'?'linear-gradient(135deg,#f59e0b,#d97706)':result==='Tails'?'linear-gradient(135deg,#94a3b8,#64748b)':'linear-gradient(135deg,#334155,#1e293b)',border:'6px solid',borderColor:result==='Heads'?'#fbbf24':result==='Tails'?'#94a3b8':'#475569',boxShadow:'0 8px 32px rgba(0,0,0,0.4)',transition:'background 0.3s',fontSize:72,userSelect:'none'}}>
          {result==='Heads'?'♛':result==='Tails'?'🦅':'🪙'}
        </div>

        {result && !flipping && (
          <div style={{fontSize:40,fontWeight:800,color:result==='Heads'?'#f59e0b':'#94a3b8',marginBottom:8,letterSpacing:1}}>{result.toUpperCase()}</div>
        )}
        {flipping && <div style={{fontSize:24,color:'#64748b',marginBottom:8}}>Flipping…</div>}
        {!result && !flipping && <div style={{fontSize:20,color:'#475569',marginBottom:8}}>Click to flip</div>}

        {streak.count >= 3 && !flipping && (
          <div style={{fontSize:14,color:'#38bdf8',marginBottom:16}}>🔥 {streak.count} {streak.val} in a row!</div>
        )}

        <button onClick={flip} disabled={flipping} style={{background:flipping?'#334155':'#38bdf8',color:flipping?'#64748b':'#0f172a',border:'none',borderRadius:12,padding:'14px 48px',fontSize:18,fontWeight:700,cursor:flipping?'not-allowed':'pointer',marginTop:8}}>
          {flipping ? 'Flipping…' : 'Flip Coin'}
        </button>
      </div>

      {total > 0 && (
        <div style={{background:'#1e293b',borderRadius:16,padding:20,border:'1px solid #334155',marginBottom:16}}>
          <h2 style={{fontSize:15,fontWeight:600,marginBottom:14}}>Stats — {total} flip{total!==1?'s':''}</h2>
          <div style={{display:'flex',gap:16,marginBottom:12}}>
            <div style={{flex:1,textAlign:'center',background:'#0f172a',borderRadius:10,padding:'12px 8px'}}>
              <div style={{fontSize:28,fontWeight:700,color:'#f59e0b'}}>{heads}</div>
              <div style={{fontSize:12,color:'#64748b'}}>Heads ({hPct}%)</div>
            </div>
            <div style={{flex:1,textAlign:'center',background:'#0f172a',borderRadius:10,padding:'12px 8px'}}>
              <div style={{fontSize:28,fontWeight:700,color:'#94a3b8'}}>{tails}</div>
              <div style={{fontSize:12,color:'#64748b'}}>Tails ({tPct}%)</div>
            </div>
          </div>
          <div style={{background:'#334155',borderRadius:6,height:10,overflow:'hidden'}}>
            <div style={{width:`${hPct}%`,height:'100%',background:'#f59e0b',transition:'width 0.4s'}}/>
          </div>
          <button onClick={()=>{setHistory([]);setHeads(0);setTails(0);setResult(null);setStreak({val:null,count:0});}} style={{width:'100%',marginTop:12,background:'none',border:'1px solid #334155',color:'#94a3b8',borderRadius:8,padding:'7px',fontSize:13,cursor:'pointer'}}>Reset stats</button>
        </div>
      )}

      {history.length > 0 && (
        <div style={{background:'#1e293b',borderRadius:16,padding:20,border:'1px solid #334155'}}>
          <h2 style={{fontSize:15,fontWeight:600,marginBottom:12}}>History (last 50)</h2>
          <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
            {history.map((h,i) => (
              <span key={i} style={{background:h==='Heads'?'#f59e0b':'#475569',color:'#0f172a',borderRadius:6,padding:'3px 9px',fontSize:12,fontWeight:700}}>{h[0]}</span>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<CoinFlip />);
//]]>
</script>
</body>
</html>
