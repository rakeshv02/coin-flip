<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f172a;color:#f1f5f9;min-height:100vh}
nav{background:#1e293b;border-bottom:1px solid #334155;padding:14px 24px;display:flex;align-items:center;gap:16px}
nav a{color:#94a3b8;text-decoration:none;font-size:14px}nav a:hover{color:#f1f5f9}
nav .brand{color:#38bdf8;font-weight:700;font-size:18px}
.ad-banner{background:#1e293b;border-bottom:1px solid #334155;padding:8px;text-align:center}
#app{max-width:520px;margin:40px auto;padding:0 20px}
h1{font-size:28px;font-weight:700;margin-bottom:8px;text-align:center}
.subtitle{color:#94a3b8;margin-bottom:32px;text-align:center}
.card{background:#1e293b;border-radius:20px;padding:40px 24px;text-align:center;border:1px solid #334155;margin-bottom:20px}
#coin-canvas{display:block;margin:0 auto 28px;cursor:pointer}
#result-label{font-size:40px;font-weight:800;letter-spacing:1px;margin-bottom:8px;min-height:50px}
#streak{font-size:14px;color:#38bdf8;margin-bottom:16px;min-height:20px}
#flip-btn{background:#38bdf8;color:#0f172a;border:none;border-radius:12px;padding:14px 48px;font-size:18px;font-weight:700;cursor:pointer;margin-top:8px}
#flip-btn:disabled{background:#334155;color:#64748b;cursor:not-allowed}
.stats-card{background:#1e293b;border-radius:16px;padding:20px;border:1px solid #334155;margin-bottom:16px;display:none}
.stat-boxes{display:flex;gap:16px;margin-bottom:12px}
.stat-box{flex:1;text-align:center;background:#0f172a;border-radius:10px;padding:12px 8px}
.stat-num{font-size:28px;font-weight:700}
.stat-lbl{font-size:12px;color:#64748b}
.bar-track{background:#334155;border-radius:6px;height:10px;overflow:hidden}
.bar-fill{height:100%;background:#f59e0b;border-radius:6px;transition:width .4s}
#reset-btn{width:100%;margin-top:12px;background:none;border:1px solid #334155;color:#94a3b8;border-radius:8px;padding:7px;font-size:13px;cursor:pointer}
.history-card{background:#1e293b;border-radius:16px;padding:20px;border:1px solid #334155;display:none}
.history-card h2{font-size:15px;font-weight:600;margin-bottom:12px}
#chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{border-radius:6px;padding:3px 9px;font-size:12px;font-weight:700}
</style>
</head>
<body>
<nav><span class="brand">⚡ Tabutility</span><a href="https://tabutility.com">← All Tools</a></nav>
<div class="ad-banner"><ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-7039091592734005" data-ad-slot="auto" data-ad-format="auto" data-full-width-responsive="true"></ins><script>(adsbygoogle=window.adsbygoogle||[]).push({});</script></div>
<div id="app">
  <h1>Coin Flip</h1>
  <p class="subtitle">Click the coin or the button — heads or tails?</p>
  <div class="card">
    <canvas id="coin-canvas" width="180" height="180" onclick="doFlip()"></canvas>
    <div id="result-label"></div>
    <div id="streak"></div>
    <button id="flip-btn" onclick="doFlip()">Flip Coin</button>
  </div>
  <div class="stats-card" id="stats-card">
    <h2 id="stats-title">Stats</h2>
    <div class="stat-boxes">
      <div class="stat-box"><div class="stat-num" id="heads-num" style="color:#f59e0b">0</div><div class="stat-lbl" id="heads-lbl">Heads (50%)</div></div>
      <div class="stat-box"><div class="stat-num" id="tails-num" style="color:#94a3b8">0</div><div class="stat-lbl" id="tails-lbl">Tails (50%)</div></div>
    </div>
    <div class="bar-track"><div class="bar-fill" id="bar-fill" style="width:50%"></div></div>
    <button id="reset-btn" onclick="resetStats()">Reset stats</button>
  </div>
  <div class="history-card" id="history-card">
    <h2>History (last 50)</h2>
    <div id="chips"></div>
  </div>
</div>
<script>
var canvas = document.getElementById('coin-canvas');
var ctx = canvas.getContext('2d');
var CX = canvas.width / 2;   // 90
var CY = canvas.height / 2;  // 90
var R  = 80;

var flipping = false;
var rafId = null;
var heads = 0;
var tails = 0;
var streakVal = null;
var streakCount = 0;
var flipHistory = [];

// coin face: 'idle' | 'heads' | 'tails'
var currentFace = 'idle';

var resultLabel = document.getElementById('result-label');
var streakEl    = document.getElementById('streak');
var flipBtn     = document.getElementById('flip-btn');
var statsCard   = document.getElementById('stats-card');
var statsTitle  = document.getElementById('stats-title');
var headsNum    = document.getElementById('heads-num');
var tailsNum    = document.getElementById('tails-num');
var headsLbl    = document.getElementById('heads-lbl');
var tailsLbl    = document.getElementById('tails-lbl');
var barFill     = document.getElementById('bar-fill');
var histCard    = document.getElementById('history-card');
var chipsEl     = document.getElementById('chips');

// ── Drawing ───────────────────────────────────────────────────────────────────
function drawCoin(scaleX, face) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.save();
  // Scale around centre on X axis to create the "flip" squish effect
  ctx.translate(CX, CY);
  ctx.scale(scaleX, 1);
  ctx.translate(-CX, -CY);

  // Drop shadow
  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  ctx.shadowBlur = 18;
  ctx.shadowOffsetY = 6;

  // Coin circle
  ctx.beginPath();
  ctx.arc(CX, CY, R, 0, 2 * Math.PI);

  if (face === 'heads') {
    // Gold gradient
    var gH = ctx.createRadialGradient(CX - 20, CY - 20, 5, CX, CY, R);
    gH.addColorStop(0, '#fde68a');
    gH.addColorStop(0.5, '#f59e0b');
    gH.addColorStop(1, '#b45309');
    ctx.fillStyle = gH;
  } else if (face === 'tails') {
    // Silver gradient
    var gT = ctx.createRadialGradient(CX - 20, CY - 20, 5, CX, CY, R);
    gT.addColorStop(0, '#e2e8f0');
    gT.addColorStop(0.5, '#94a3b8');
    gT.addColorStop(1, '#334155');
    ctx.fillStyle = gT;
  } else {
    // Idle — neutral
    var gI = ctx.createRadialGradient(CX - 20, CY - 20, 5, CX, CY, R);
    gI.addColorStop(0, '#475569');
    gI.addColorStop(1, '#1e293b');
    ctx.fillStyle = gI;
  }
  ctx.fill();

  // Rim
  ctx.shadowColor = 'transparent';
  ctx.strokeStyle = face === 'heads' ? '#fbbf24' : face === 'tails' ? '#94a3b8' : '#475569';
  ctx.lineWidth = 6;
  ctx.stroke();

  // Text / symbol — only draw when coin is wide enough to be readable
  if (Math.abs(scaleX) > 0.3) {
    ctx.shadowColor = 'transparent';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    if (face === 'heads') {
      ctx.fillStyle = '#78350f';
      ctx.font = 'bold 22px sans-serif';
      ctx.fillText('HEADS', CX, CY + 28);
      ctx.font = 'bold 46px sans-serif';
      ctx.fillStyle = '#92400e';
      ctx.fillText('H', CX, CY - 12);
    } else if (face === 'tails') {
      ctx.fillStyle = '#1e293b';
      ctx.font = 'bold 22px sans-serif';
      ctx.fillText('TAILS', CX, CY + 28);
      ctx.font = 'bold 46px sans-serif';
      ctx.fillStyle = '#334155';
      ctx.fillText('T', CX, CY - 12);
    } else {
      ctx.fillStyle = '#64748b';
      ctx.font = 'bold 36px sans-serif';
      ctx.fillText('?', CX, CY);
    }
  }

  ctx.restore();
}

// ── Animation ─────────────────────────────────────────────────────────────────
function doFlip() {
  if (flipping) return;
  flipping = true;
  flipBtn.disabled = true;
  flipBtn.textContent = 'Flipping…';
  resultLabel.textContent = '';
  streakEl.textContent = '';

  var result = Math.random() < 0.5 ? 'Heads' : 'Tails';
  var duration = 900;       // ms total
  var startTime = null;

  // During the first half we show the outgoing face (or idle),
  // during the second half we show the result face.
  var outFace = currentFace === 'idle' ? 'idle' : currentFace;

  function animate(ts) {
    if (!startTime) startTime = ts;
    var t = Math.min((ts - startTime) / duration, 1);

    // scaleX: 1 → 0 → 1, completing ~3 half-turns
    var cycles = 3;   // number of half-flips
    var scaleX = Math.cos(t * cycles * Math.PI);

    // Switch face at each zero-crossing of scaleX;
    // on the final half-turn show the result face
    var halfTurn = Math.floor(t * cycles);
    var face;
    if (t >= 1) {
      face = result === 'Heads' ? 'heads' : 'tails';
    } else if (halfTurn >= cycles - 1) {
      face = result === 'Heads' ? 'heads' : 'tails';
    } else {
      face = halfTurn % 2 === 0 ? outFace : (result === 'Heads' ? 'heads' : 'tails');
    }

    drawCoin(scaleX, face);

    if (t < 1) {
      rafId = requestAnimationFrame(animate);
    } else {
      // Animation done
      currentFace = result === 'Heads' ? 'heads' : 'tails';
      drawCoin(1, currentFace);

      if (result === 'Heads') {
        resultLabel.textContent = 'HEADS';
        resultLabel.style.color = '#f59e0b';
        heads++;
      } else {
        resultLabel.textContent = 'TAILS';
        resultLabel.style.color = '#94a3b8';
        tails++;
      }

      if (streakVal === result) {
        streakCount++;
      } else {
        streakVal = result;
        streakCount = 1;
      }
      if (streakCount >= 3) {
        streakEl.textContent = '🔥 ' + streakCount + ' ' + result + ' in a row!';
      }

      flipHistory.unshift(result);
      if (flipHistory.length > 50) flipHistory.pop();

      updateStats();
      updateHistory();

      flipping = false;
      flipBtn.disabled = false;
      flipBtn.textContent = 'Flip Coin';
    }
  }

  rafId = requestAnimationFrame(animate);
}

function updateStats() {
  var total = heads + tails;
  if (!total) return;
  statsCard.style.display = 'block';
  var hPct = Math.round(heads / total * 100);
  statsTitle.textContent = 'Stats — ' + total + ' flip' + (total !== 1 ? 's' : '');
  headsNum.textContent = heads;
  tailsNum.textContent = tails;
  headsLbl.textContent = 'Heads (' + hPct + '%)';
  tailsLbl.textContent = 'Tails (' + (100 - hPct) + '%)';
  barFill.style.width = hPct + '%';
}

function updateHistory() {
  if (!flipHistory.length) { histCard.style.display = 'none'; return; }
  histCard.style.display = 'block';
  chipsEl.innerHTML = '';
  flipHistory.forEach(function(h) {
    var chip = document.createElement('span');
    chip.className = 'chip';
    chip.style.background = h === 'Heads' ? '#f59e0b' : '#475569';
    chip.style.color = h === 'Heads' ? '#0f172a' : '#f1f5f9';
    chip.textContent = h[0];
    chipsEl.appendChild(chip);
  });
}

function resetStats() {
  heads = 0; tails = 0; streakVal = null; streakCount = 0;
  flipHistory = []; currentFace = 'idle';
  statsCard.style.display = 'none';
  histCard.style.display = 'none';
  resultLabel.textContent = '';
  streakEl.textContent = '';
  drawCoin(1, 'idle');
}

// Initial draw
drawCoin(1, 'idle');
</script>
</body>
</html>
